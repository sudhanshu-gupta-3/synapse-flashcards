<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Synapse — Turn any PDF into smart, practice-ready flashcards with spaced repetition for long-term retention.">
    <title>Synapse — Smart Flashcards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- Sidebar Navigation -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">
                <svg viewBox="0 0 40 40" fill="none">
                    <circle cx="20" cy="14" r="4" fill="url(#g1)"/>
                    <circle cx="12" cy="26" r="3.5" fill="url(#g1)" opacity="0.7"/>
                    <circle cx="28" cy="26" r="3.5" fill="url(#g1)" opacity="0.7"/>
                    <line x1="20" y1="18" x2="13" y2="23" stroke="url(#g1)" stroke-width="1.5" opacity="0.5"/>
                    <line x1="20" y1="18" x2="27" y2="23" stroke="url(#g1)" stroke-width="1.5" opacity="0.5"/>
                    <line x1="15" y1="26" x2="25" y2="26" stroke="url(#g1)" stroke-width="1.5" opacity="0.3"/>
                    <defs><linearGradient id="g1" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#a78bfa"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs>
                </svg>
            </div>
            <span class="logo-text">Synapse</span>
        </div>

        <div class="nav-links">
            <a href="#dashboard" class="nav-link active" data-view="dashboard" id="nav-dashboard">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                <span>Dashboard</span>
            </a>
            <a href="#upload" class="nav-link" data-view="upload" id="nav-upload">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                <span>Upload PDF</span>
            </a>
            <a href="#stats" class="nav-link" data-view="stats" id="nav-stats">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
                <span>Statistics</span>
            </a>
        </div>

        <div class="sidebar-footer">
            <div class="search-box" id="global-search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                <input type="text" placeholder="Search cards..." id="search-input">
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
        <!-- Views are rendered dynamically by app.js -->
    </main>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Confetti Canvas -->
    <canvas id="confetti-canvas"></canvas>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/components.js"></script>
    <script src="/static/js/views.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
